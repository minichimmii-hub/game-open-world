<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Adventure Ultra</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #2d5a27; }
        
        #ui-layer {
            position: absolute; top: 15px; left: 15px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            border: 2px solid #f1c40f; pointer-events: none; min-width: 200px;
        }

        #shop-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: #2c3e50; color: white; padding: 25px;
            border: 4px solid gold; display: none; border-radius: 15px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); pointer-events: auto;
        }

        #dialog {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; background: #000; color: gold; padding: 20px;
            border: 2px solid white; border-radius: 10px; display: none; text-align: center;
        }

        .btn { 
            background: #27ae60; color: white; border: none; padding: 10px; 
            margin: 5px; cursor: pointer; width: 100%; border-radius: 5px; font-weight: bold;
        }
        .stat-val { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div>💰 UANG: $<span id="money" class="stat-val">0</span></div>
    <div>⚔️ SENJATA: <span id="weapon" class="stat-val">Tangan Kosong</span></div>
    <div>❤️ DARAH: <span id="hp" class="stat-val">100</span></div>
    <div>🌟 LEVEL: <span id="lvl" class="stat-val">1</span></div>
    <div style="font-size: 12px; margin-top: 10px; color: #aaa;">WASD: Jalan | S: Buka Toko (di NPC)</div>
</div>

<div id="shop-menu">
    <h2>🏪 TOKO SENJATA</h2>
    <p>Uangmu: $<span id="shop-money">0</span></p>
    <button class="btn" onclick="buyWeapon('Belati Karatan', 50, 20)">🗡️ Belati ($50)</button>
    <button class="btn" onclick="buyWeapon('Pedang Ksatria', 200, 50)">⚔️ Pedang ($200)</button>
    <button class="btn" onclick="buyWeapon('Tongkat Naga', 1000, 150)">🔥 Tongkat Naga ($1000)</button>
    <button class="btn" style="background:#c0392b" onclick="toggleShop()">TUTUP</button>
</div>

<div id="dialog">
    <div id="msg"></div>
    <button class="btn" onclick="closeDialog()" style="width:100px; margin-top:10px;">OK</button>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // Konfigurasi Player
    let player = { 
        x: 400, y: 300, size: 50, speed: 6, 
        money: 100, hp: 100, weapon: "Tangan Kosong", dmg: 10, lvl: 1 
    };

    let camera = { x: 0, y: 0 };
    let gameState = "EXPLORE";
    let keys = {};

    // Objek Dunia
    let worldObjects = [
        { x: 200, y: 200, type: 'house', icon: '🏠', label: 'RUMAH' },
        { x: 800, y: 500, type: 'npc', icon: '👳', label: 'PEDAGANG (Tekan S)' },
        { x: 1200, y: 800, type: 'monster', icon: '👾', label: 'BOSS SLIME' },
        { x: 400, y: 800, type: 'tree', icon: '🌳' },
        { x: 1000, y: 200, type: 'tree', icon: '🌲' }
    ];

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function update() {
        if (gameState === "EXPLORE") {
            if (keys['w']) player.y -= player.speed;
            if (keys['s']) player.y += player.speed;
            if (keys['a']) player.x -= player.speed;
            if (keys['d']) player.x += player.speed;

            camera.x = player.x - window.innerWidth / 2;
            camera.y = player.y - window.innerHeight / 2;

            // Cek Interaksi
            worldObjects.forEach(obj => {
                let d = Math.hypot(player.x - obj.x, player.y - obj.y);
                if (d < 60) {
                    if (obj.type === 'npc' && keys['s']) toggleShop();
                    if (obj.type === 'monster') startBattle();
                }
            });
        }
        updateUI();
    }

    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Gambar Rumput
        ctx.fillStyle = "#2d5a27";
        ctx.fillRect(-2000, -2000, 5000, 5000);

        // Gambar Objek
        ctx.textAlign = "center";
        worldObjects.forEach(obj => {
            ctx.font = "60px serif";
            ctx.fillText(obj.icon, obj.x, obj.y);
            ctx.font = "bold 16px Arial";
            ctx.fillStyle = "white";
            ctx.fillText(obj.label || "", obj.x, obj.y - 60);
        });

        // Gambar Player
        ctx.font = "60px serif";
        ctx.fillText("🥷", player.x, player.y);
        ctx.font = "14px Arial";
        ctx.fillStyle = "cyan";
        ctx.fillText("KAMU (LEVEL "+player.lvl+")", player.x, player.y - 60);

        ctx.restore();

        if (gameState === "BATTLE") drawBattle();

        requestAnimationFrame(() => { update(); draw(); });
    }

    function drawBattle() {
        ctx.fillStyle = "rgba(0,0,0,0.9)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("💥 PERTARUNGAN DIMULAI 💥", canvas.width/2 - 200, 100);
        ctx.fillText("Tekan 'A' untuk menyerang!", canvas.width/2 - 150, 150);
        
        ctx.font = "100px serif";
        ctx.fillText("🥷", 200, canvas.height/2);
        ctx.fillText("👾", canvas.width - 300, canvas.height/2);
    }

    function startBattle() {
        if(gameState === "BATTLE") return;
        gameState = "BATTLE";
        window.addEventListener('keydown', handleAttack);
    }

    function handleAttack(e) {
        if(e.key === 'a' && gameState === "BATTLE") {
            player.money += 50;
            player.lvl += 1;
            gameState = "EXPLORE";
            player.x -= 100; // Mental
            showMsg("Menang! Dapat $50 & Naik Level!");
            window.removeEventListener('keydown', handleAttack);
        }
    }

    function toggleShop() {
        const s = document.getElementById('shop-menu');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
        document.getElementById('shop-money').innerText = player.money;
    }

    function buyWeapon(name, price, dmg) {
        if(player.money >= price) {
            player.money -= price;
            player.weapon = name;
            player.dmg = dmg;
            toggleShop();
            showMsg("Berhasil membeli " + name + "!");
        } else {
            alert("Uang tidak cukup!");
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = player.money;
        document.getElementById('weapon').innerText = player.weapon;
        document.getElementById('hp').innerText = player.hp;
        document.getElementById('lvl').innerText = player.lvl;
    }

    function showMsg(t) {
        document.getElementById('msg').innerText = t;
        document.getElementById('dialog').style.display = 'block';
    }
    function closeDialog() { document.getElementById('dialog').style.display = 'none'; }

    draw();
</script>
</body>
</html>
